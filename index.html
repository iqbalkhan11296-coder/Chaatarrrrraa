<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mi Amour</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(120deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
      background-size: 400% 400%;
      animation: gradientFlow 15s ease infinite;
      font-family: 'Open Sans', sans-serif;
      color: #333;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2);
    }

    h1 {
      text-align: center;
      font-family: 'Great Vibes', cursive;
      font-size: 60px;
      color: #e60073;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 15px;
      font-size: 16px;
      border: 2px solid #ff80ab;
      border-radius: 12px;
      resize: vertical;
      box-sizing: border-box;
      background: #fff0f6;
      color: #4a4a4a;
    }

    button {
      display: block;
      margin: 25px auto 10px;
      background: linear-gradient(to right, #ff6a88, #ff99ac);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 18px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, background 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(to right, #ff4081, #ff80ab);
    }

    .output {
      background: #fff0f5;
      padding: 20px;
      border: 2px dashed #ff80ab;
      border-radius: 12px;
      font-size: 18px;
      min-height: 60px;
      white-space: pre-wrap;
      color: #d6336c;
    }

    label {
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
      font-size: 16px;
      color: #99004d;
    }

    footer {
      text-align: center;
      font-size: 14px;
      margin-top: 30px;
      color: #ff4081;
    }

    footer span {
      font-family: 'Great Vibes', cursive;
      font-size: 20px;
      color: #e60073;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Mi Amour</h1>
    <img src="https://i.imgur.com/2yaf2wb.png" alt="Love" style="display:block;margin:20px auto;width:120px;">
    <label for="inputText">Write a love note:</label>
    <textarea id="inputText" placeholder="Type something magical..."></textarea>
    <button onclick="swapLetters()">Transform</button>
    <label>Translated with love:</label>
    <div class="output" id="output"></div>
  </div>

  <footer>
    Made with 💖 for <span>My Love</span>
  </footer>

  <audio id="bgMusic" autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    function swapLetters() {
      const input = document.getElementById('inputText').value;
      let converted = '';

      for (let char of input) {
        let code = char.charCodeAt(0);
        if (char >= 'A' && char <= 'Z') {
          converted += (code - 65) % 2 === 0 ? String.fromCharCode(code + 1) : String.fromCharCode(code - 1);
        } else if (char >= 'a' && char <= 'z') {
          converted += (code - 97) % 2 === 0 ? String.fromCharCode(code + 1) : String.fromCharCode(code - 1);
        } else {
          converted += char;
        }
      }

      const output = document.getElementById('output');
      output.innerText = '';
      let i = 0;

      function typeEffect() {
        if (i < converted.length) {
          output.innerText += converted.charAt(i);
          i++;
          setTimeout(typeEffect, 40);
        }
      }

      typeEffect();

      setTimeout(() => {
        alert("Hi mwthe😌.. I lob you😌💋~ Ikru");
      }, 400);
    }
  </script>

</body>
</html>
